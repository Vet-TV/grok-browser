<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab — Grok Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: radial-gradient(ellipse at 50% 0%, #1a1520 0%, #07070c 60%);
      color: #f0f0f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px;
    }
    .logo {
      width: 64px; height: 64px;
      border: 2px solid #e8a838;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: #e8a838;
      margin-bottom: 16px;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
    .tagline { color: #9898a8; font-size: 14px; margin-bottom: 36px; }
    .search-wrap {
      width: 100%; max-width: 560px;
      display: flex; background: #16161f;
      border: 1px solid #2a2a3a; border-radius: 24px;
      padding: 4px 4px 4px 16px; margin-bottom: 40px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-wrap:focus-within {
      border-color: #c48a20;
      box-shadow: 0 0 0 3px rgba(232,168,56,0.15);
    }
    .search-wrap input {
      flex: 1; border: none; background: transparent;
      color: #f0f0f5; font-size: 15px; outline: none; height: 40px;
    }
    .search-wrap button {
      background: #e8a838; color: #07070c; border: none;
      border-radius: 20px; padding: 0 20px; font-weight: 600;
      font-size: 13px; cursor: pointer;
    }
    .search-wrap button:hover { background: #c48a20; }
    .section-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
      color: #5c5c6e; margin-bottom: 12px; align-self: flex-start;
      max-width: 640px; width: 100%;
    }
    .tiles {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px; width: 100%; max-width: 640px; margin-bottom: 32px;
    }
    .tile {
      background: #16161f; border: 1px solid #2a2a3a;
      border-radius: 12px; padding: 16px; cursor: pointer;
      text-decoration: none; color: #f0f0f5;
      transition: border-color 0.15s, transform 0.15s;
      display: flex; flex-direction: column; gap: 8px;
    }
    .tile:hover { border-color: #e8a838; transform: translateY(-2px); }
    .tile-icon { font-size: 22px; }
    .tile-label { font-size: 13px; font-weight: 500; }
    .tile-sub { font-size: 11px; color: #5c5c6e; }
    .hints {
      display: flex; flex-wrap: wrap; gap: 8px;
      max-width: 640px; width: 100%;
    }
    .hint {
      background: #16161f; border: 1px solid #2a2a3a;
      border-radius: 16px; padding: 8px 14px;
      font-size: 12px; color: #9898a8; cursor: pointer;
    }
    .hint:hover { border-color: #e8a838; color: #e8a838; }
    .hint kbd {
      background: #0f0f16; padding: 2px 6px; border-radius: 4px;
      font-size: 11px; margin-right: 4px;
    }
  </style>
</head>
<body>
  <div class="logo">⊕</div>
  <h1>Grok Browser</h1>
  <p class="tagline">Browse smarter with AI built in</p>

  <form class="search-wrap" id="search-form">
    <input type="text" id="search-input" placeholder="Search the web or enter a URL" autofocus />
    <button type="submit">Go</button>
  </form>

  <div class="section-title">Quick links</div>
  <div class="tiles">
    <a class="tile" href="https://x.ai"><span class="tile-icon">𝕏</span><span class="tile-label">xAI</span><span class="tile-sub">Grok &amp; AI news</span></a>
    <a class="tile" href="https://github.com"><span class="tile-icon">⌨</span><span class="tile-label">GitHub</span><span class="tile-sub">Open source</span></a>
    <a class="tile" href="https://news.ycombinator.com"><span class="tile-icon">📰</span><span class="tile-label">Hacker News</span><span class="tile-sub">Tech news</span></a>
    <a class="tile" href="https://wikipedia.org"><span class="tile-icon">📚</span><span class="tile-label">Wikipedia</span><span class="tile-sub">Knowledge</span></a>
    <a class="tile" href="https://console.x.ai"><span class="tile-icon">🔑</span><span class="tile-label">xAI Console</span><span class="tile-sub">API keys</span></a>
    <a class="tile" href="https://arxiv.org"><span class="tile-icon">🔬</span><span class="tile-label">arXiv</span><span class="tile-sub">Research papers</span></a>
  </div>

  <div class="section-title">Keyboard shortcuts</div>
  <div class="hints">
    <span class="hint"><kbd>Ctrl</kbd>+<kbd>T</kbd> New tab</span>
    <span class="hint"><kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>G</kbd> Toggle Grok</span>
    <span class="hint"><kbd>Ctrl</kbd>+<kbd>F</kbd> Find in page</span>
    <span class="hint"><kbd>Ctrl</kbd>+<kbd>D</kbd> Bookmark</span>
    <span class="hint"><kbd>Ctrl</kbd>+<kbd>H</kbd> History</span>
  </div>

  <script>
    document.getElementById('search-form').addEventListener('submit', (e) => {
      e.preventDefault()
      const q = document.getElementById('search-input').value.trim()
      if (!q) return
      const isUrl = /^https?:\/\//i.test(q) || /^[\w-]+\.[\w.-]+/.test(q)
      if (isUrl) {
        location.href = /^https?:\/\//i.test(q) ? q : 'https://' + q
      } else {
        location.href = 'https://www.google.com/search?q=' + encodeURIComponent(q)
      }
    })
  </script>
</body>
</html>
